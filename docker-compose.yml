services:
  soroban-bot:
    image: ghcr.io/openruyi/soroban-bot:latest
    # Or build locally:
    # build: .
    container_name: soroban-bot
    restart: unless-stopped
    ports:
      - "3456:3456"
    volumes:
      # Mount your configuration file
      - ./appsettings.json:/app/appsettings.json:ro
      # Optional: Mount custom labels file
      # - ./labels.json:/app/labels.json:ro
    environment:
      # You can also use environment variables instead of appsettings.json
      # These will override appsettings.json values
      # - GitHubApp__AppId=123456
      # - GitHubApp__InstallationId=78901234
      # - GitHubApp__PrivateKey=-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

